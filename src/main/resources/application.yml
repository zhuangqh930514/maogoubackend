server:
  port: 8081
  servlet:
    context-path: /

spring:
  application:
    name: maogou-stock-backend
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${MYSQL_URL:jdbc:mysql://8.138.232.4:3306/maogou?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${MYSQL_USERNAME:zqh}
    password: ${MYSQL_PASSWORD:930514}
  jackson:
    time-zone: Asia/Shanghai
    date-format: yyyy-MM-dd HH:mm:ss

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

management:
  endpoints:
    web:
      exposure:
        include: health,info

maogou:
  market:
    provider: ${MAOGOU_MARKET_PROVIDER:sina}
    akshare-base-url: http://127.0.0.1:5000
    sina-base-url: https://hq.sinajs.cn
    timeout-ms: ${MAOGOU_MARKET_TIMEOUT_MS:5000}
    quote-cache-ttl-seconds: ${MAOGOU_QUOTE_CACHE_TTL_SECONDS:15}
    finance-cache-ttl-seconds: ${MAOGOU_FINANCE_CACHE_TTL_SECONDS:1800}
  ai:
    api-base-url: ${MAOGOU_AI_API_BASE_URL:http://localhost:11434/v1}
    model-name: ${MAOGOU_AI_MODEL_NAME:qwen3.6}
    api-key: "${MAOGOU_AI_API_KEY:}"
    timeout-ms: 60000
    temperature: 0.2
    max-tokens: 2048
  scheduler:
    enabled: ${MAOGOU_SCHEDULER_ENABLED:false}
    news-fixed-rate-ms: 300000
    intraday-analysis-fixed-rate-ms: 1800000
    close-analysis-cron: "0 30 15 * * MON-FRI"
  auth:
    jwt-secret: ${MAOGOU_JWT_SECRET:maogou-local-dev-secret-change-me}
    access-token-ttl-minutes: ${MAOGOU_ACCESS_TOKEN_TTL_MINUTES:1440}
