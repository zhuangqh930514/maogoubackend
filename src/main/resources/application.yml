server:
  port: 8081
  servlet:
    context-path: /

spring:
  application:
    name: maogou-stock-backend
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${MYSQL_URL:jdbc:mysql://8.138.232.4:3306/maogou?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${MYSQL_USERNAME:zqh}
    password: ${MYSQL_PASSWORD:930514}
  jackson:
    time-zone: Asia/Shanghai
    date-format: yyyy-MM-dd HH:mm:ss
  servlet:
    multipart:
      max-file-size: ${MAOGOU_MODEL_PACKAGE_MAX_SIZE:512MB}
      max-request-size: ${MAOGOU_MODEL_PACKAGE_MAX_SIZE:512MB}

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        http.server.requests: true
      percentiles:
        http.server.requests: 0.5,0.95,0.99

maogou:
  performance:
    slow-request-threshold-ms: ${MAOGOU_SLOW_REQUEST_THRESHOLD_MS:1000}
  market:
    provider: ${MAOGOU_MARKET_PROVIDER:sina}
    akshare-base-url: http://127.0.0.1:5000
    sina-base-url: https://hq.sinajs.cn
    timeout-ms: ${MAOGOU_MARKET_TIMEOUT_MS:5000}
    quote-cache-ttl-seconds: ${MAOGOU_QUOTE_CACHE_TTL_SECONDS:15}
    finance-cache-ttl-seconds: ${MAOGOU_FINANCE_CACHE_TTL_SECONDS:1800}
    sector-heatmap-cache-ttl-seconds: ${MAOGOU_SECTOR_HEATMAP_CACHE_TTL_SECONDS:60}
    sector-hot-stocks-cache-ttl-seconds: ${MAOGOU_SECTOR_HOT_STOCKS_CACHE_TTL_SECONDS:60}
    research-provider-order: ${MAOGOU_RESEARCH_PROVIDER_ORDER:EASTMONEY,SINA}
    benchmark-symbol: ${MAOGOU_RESEARCH_BENCHMARK_SYMBOL:000300.SH}
    source-cooldown-base-seconds: ${MAOGOU_SOURCE_COOLDOWN_BASE_SECONDS:30}
    source-cooldown-max-seconds: ${MAOGOU_SOURCE_COOLDOWN_MAX_SECONDS:900}
    source-cooldown-failure-threshold: ${MAOGOU_SOURCE_COOLDOWN_FAILURE_THRESHOLD:3}
    source-price-tolerance-pct: ${MAOGOU_SOURCE_PRICE_TOLERANCE_PCT:0.005}
    source-volume-tolerance-pct: ${MAOGOU_SOURCE_VOLUME_TOLERANCE_PCT:0.15}
    source-max-daily-change-pct: ${MAOGOU_SOURCE_MAX_DAILY_CHANGE_PCT:0.35}
    news-feature-window-hours: ${MAOGOU_NEWS_FEATURE_WINDOW_HOURS:36}
  ai:
    api-base-url: ${MAOGOU_AI_API_BASE_URL:http://localhost:11434/v1}
    model-name: ${MAOGOU_AI_MODEL_NAME:qwen3.6}
    api-key: "${MAOGOU_AI_API_KEY:}"
    timeout-ms: 60000
    temperature: 0.2
    max-tokens: 2048
  scheduler:
    enabled: ${MAOGOU_SCHEDULER_ENABLED:true}
    news-fixed-rate-ms: 300000
    intraday-analysis-fixed-rate-ms: 1800000
    close-analysis-cron: "0 30 15 * * MON-FRI"
    evolution-review-cron: "${MAOGOU_EVOLUTION_REVIEW_CRON:0 10 16 * * MON-FRI}"
    auto-close-pipeline-cron: "${MAOGOU_AUTO_CLOSE_PIPELINE_CRON:0 0 16 * * MON-FRI}"
    weekly-evolution-cron: "${MAOGOU_WEEKLY_EVOLUTION_CRON:0 0 18 * * FRI}"
    monthly-training-cron: "${MAOGOU_MONTHLY_TRAINING_CRON:0 0 19 1 * *}"
    weekly-lookback-days: ${MAOGOU_WEEKLY_LOOKBACK_DAYS:180}
    monthly-minimum-samples: ${MAOGOU_MONTHLY_MINIMUM_SAMPLES:1000}
    training-artifact-root: "${MAOGOU_TRAINING_ARTIFACT_ROOT:./data/ai-training}"
    model-package-max-bytes: ${MAOGOU_MODEL_PACKAGE_MAX_BYTES:536870912}
    historical-state-import-max-bytes: ${MAOGOU_HISTORICAL_STATE_IMPORT_MAX_BYTES:134217728}
    trainer-python-executable: "${MAOGOU_TRAINER_PYTHON_EXECUTABLE:python3}"
    trainer-script: "${MAOGOU_TRAINER_SCRIPT:ml/train_ranker.py}"
    trainer-timeout-seconds: ${MAOGOU_TRAINER_TIMEOUT_SECONDS:1800}
    training-execution-mode: ${MAOGOU_TRAINING_EXECUTION_MODE:MODEL_PACKAGE_ONLY}
    model-minimum-test-roc-auc: ${MAOGOU_MODEL_MINIMUM_TEST_ROC_AUC:0.52}
    trading-holidays: "${MAOGOU_TRADING_HOLIDAYS:2026-01-01,2026-01-02,2026-02-16,2026-02-17,2026-02-18,2026-02-19,2026-02-20,2026-02-23,2026-04-06,2026-05-01,2026-05-04,2026-05-05,2026-06-19,2026-09-25,2026-10-01,2026-10-02,2026-10-05,2026-10-06,2026-10-07}"
    trading-workdays: "${MAOGOU_TRADING_WORKDAYS:}"
  auth:
    jwt-secret: ${MAOGOU_JWT_SECRET:maogou-local-dev-secret-change-me}
    access-token-ttl-minutes: ${MAOGOU_ACCESS_TOKEN_TTL_MINUTES:1440}
  web-search:
    enabled: ${MAOGOU_WEB_SEARCH_ENABLED:true}
    provider: ${MAOGOU_WEB_SEARCH_PROVIDER:duckduckgo}
    duck-duck-go-html-url: ${MAOGOU_DUCKDUCKGO_HTML_URL:https://html.duckduckgo.com/html/}
    timeout-ms: ${MAOGOU_WEB_SEARCH_TIMEOUT_MS:8000}
    max-results: ${MAOGOU_WEB_SEARCH_MAX_RESULTS:5}
