server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: maogou-stock-backend
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${MYSQL_URL:jdbc:mysql://127.0.0.1:3306/maogou_stock?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:root}
  jackson:
    time-zone: Asia/Shanghai
    date-format: yyyy-MM-dd HH:mm:ss

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

management:
  endpoints:
    web:
      exposure:
        include: health,info

maogou:
  market:
    provider: mock
    akshare-base-url: http://127.0.0.1:5000
    sina-base-url: https://hq.sinajs.cn
  ai:
    api-base-url: http://localhost:11434/v1
    model-name: qwen3.6
    api-key: sk-local-dev-key
    timeout-ms: 60000
    temperature: 0.2
    max-tokens: 2048
  scheduler:
    enabled: true
    news-fixed-rate-ms: 300000
    intraday-analysis-fixed-rate-ms: 1800000
    close-analysis-cron: "0 30 15 * * MON-FRI"
